<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>캐나다 사무엘힐 커뮤니티교회</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  @font-face {
    font-family: 'LineSeed';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_11-01@1.0/LINESeedKR-Th.woff2') format('woff2');
    font-weight: 100;
    font-display: swap;
}

@font-face {
    font-family: 'LineSeed';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_11-01@1.0/LINESeedKR-Rg.woff2') format('woff2');
    font-weight: 400;
    font-display: swap;
}

@font-face {
    font-family: 'LineSeed';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_11-01@1.0/LINESeedKR-Bd.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
}

@font-face {
    font-family: 'Aggravo';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroL.woff') format('woff');
    font-weight: 300;
    font-display: swap;
}

@font-face {
    font-family: 'Aggravo';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroM.woff') format('woff');
    font-weight: 500;
    font-display: swap;
}

@font-face {
    font-family: 'Aggravo';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroB.woff') format('woff');
    font-weight: 700;
    font-display: swap;
}
:root {
    --bg-main: #EAF4F3;
    --primary: #1F3F37;
    --text-main: #2F2F2F;
    --sub-text: #6B7280;
    --box-bg: rgba(255,255,255,0.92);
}

body {
    margin: 0;
    font-family: 'Noto Sans KR', sans-serif;
    background: #446f81;
    color: var(--text-main);
}

/* 상단 */
.header {
    text-align: center;
    padding-top: 100px;
    position: relative;
}

/* 타이틀 박스 */
.title-box {
    background: var(--box-bg);
    backdrop-filter: blur(8px);
    padding: 90px 0px 70px;
    max-width: 1000px;
    margin: 0 auto;
    border-radius: 18px;
    box-shadow: 0px 4px 10px 1px #b1d3e2;
    position: relative;
}

/* 로고 원 (핵심) */
.logo-circle {
    width:400px;
    height: 150px;
    background: #0b2f43;
    position: absolute;
    top: -80px; /* 박스 위로 띄움 */
    left: 50%;
    transform: translateX(-50%);
    align-items: center;
    justify-content: center;

    /* 핵심 포인트 */
    border-radius: 20px;
    box-shadow: 0px 6px 25px 0px #446f8159;
    border: 6px solid #446f81; /* 배경색과 동일하게 해서 분리감 */
}

.logo-circle img{
  width: 100px;
  height: auto;
  object-fit: contain;
  padding-top: 20px;
}

/* 텍스트 */
.title-box h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
}

.coming {
  font-family: 'Aggravo';
    margin-top: 80px;
    font-size: 50px;
    font-weight: 500;
    color: #1c6674;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.desc {
    margin-top: 10px;
    font-size: 22px;
    font-weight: 500;
    color: #03505e;
    margin-bottom: 25px;
}

/* 컨텐츠 */
.container {
    max-width: 1000px;
    margin: 80px auto;
    padding: 0 20px;
}

/* 카드 */
.card {
    background: var(--box-bg);
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0px 4px 10px 1px #b1d3e2;
}

/* 섹션 */
.section-flex {
    display: flex;
    gap: 30px;
    margin-bottom: 60px;
}

.section-flex img {
    width: 100%;
    max-width: 450px;
    border-radius: 14px;
}

/* 예배 안내 */
.worship h2 {
    color: #03505e;
    margin-bottom: 15px;
}

.worship li {
    margin-bottom: 10px;
}

/* 목사 + 연혁 */
.pastor-section {
    display: flex;
    gap: 30px;
}

.pastor-section img {
    width: 240px;
    border-radius: 14px;
}

.history h2{
  color: #03505e;
}

.history p {
    line-height: 1.7;
    font-size: 14px;
}

/* 푸터 */
.footer {
    text-align: center;
    padding: 40px;
    color: var(--sub-text);
}

.footer a {
    color: var(--primary);
    text-decoration: none;
}

.section-flex,.pastor-section{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
  align-items: center;
}

.section-flex img,.pastor-section img{
  width: 100%;
  height: auto;
  display: block;
}

.pastor-section img{
  max-width: 280px;
  margin: 0 auto;
}

ul{
  list-style: none;
  padding-left: 0;
  margin: 0;
}

/* 반응형 */
@media (max-width: 768px) {

    .title-box {
        
    }

    .title-box h1 {
        font-size: 22px;
    }

    .logo-circle {
        width: 90%;
        height: 130px;
        top: -45px;
    }

    .section-flex,
    .pastor-section {
        grid-template-columns: 1fr;
    }
    .section-flex img,
    .pastor-section img{
      
    }

    .pastor-section img {
        width: 100%;
    }
}
</style>

</head>

<body>

<!-- 상단 -->
<div class="header">
    <div class="title-box">

        <div class="logo-circle">
            <img src="logo.png">
            <h1 style="font-family: 'LineSeed'; color: #fff;">캐나다사무엘힐커뮤니티교회</h1>
        </div>

        

        <div class="coming">
            COMING SOON
        </div>

        <div class="desc">홈페이지 리뉴얼 중입니다.</div>

    </div>
</div>

<!-- 메인 -->
<div class="container">

    <div class="section-flex card">
        <img src="samchurch(수정).png">

        <div class="worship">
            <h2>예배안내</h2>
            <ul>
                <li>  주일예배 : 주일 오전 11시</li>
                <li>  수요예배 : 수요일 오후 7시 30분</li>
                <li>  금요예배 : 금요일 오후 8시</li>
                <li>  청소년 / 어린이예배 : 토요일 오전 11시</li>
            </ul>
        </div>
    </div>

    <div class="pastor-section card">
        <img src="pastor.jpg" alt="담임목사">

        <div class="history">
            <h2>담임목사 권동호</h2>
            <p style="font-size: 16px;">
                  장로회신학대학교 신대원 졸업<br>
                  Northwest Seminary 목회학 박사 과정<br>
                  염산교회, 대전제일교회 부목사<br>
                  캐나다사무엘커뮤니티교회 담임목사<br>
                  대한예수교장로회(통합)소속
            </p>
        </div>
    </div>

</div>

<!-- 푸터 -->
<div style="word-break: keep-all;" class="footer">
  <p style="color: #2F2F2F;">© 2026 캐나다사무엘힐커뮤니티교회. All rights reserved.</p>
</div>

</body>
</html>
